name: Build & Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      push_image:
        description: 'Push image to GHCR (set false to dry-run build only)'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

# Multi-architecture builds:
#   - AMD64 builds on ubuntu-latest (x86_64)
#   - ARM64 builds on ubuntu-24.04-arm (native ARM, no QEMU)
# Both jobs run in parallel for fast builds and publish to separate images:
#   - ghcr.io/<owner>/compile-lab       (amd64)
#   - ghcr.io/<owner>/compile-lab-arm   (arm64)

permissions:
  packages: write
  contents: read

jobs:
  # ── AMD64 ──────────────────────────────────────────────────────────────────
  build-amd64:
    name: Build and push (amd64) → compile-lab
    runs-on: ubuntu-latest

    outputs:
      image-digest: ${{ steps.build-push.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/compile-lab
          tags: |
            type=raw,value=latest
            type=semver,pattern=v{{version}}
            type=sha,format=short
          labels: |
            org.opencontainers.image.title=Multi-Language Online Compiler (amd64)
            org.opencontainers.image.description=Supports Java 17, Python 3, C, C++, JavaScript, and TypeScript
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push (amd64)
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'workflow_dispatch' || inputs.push_image == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,mode=max,scope=amd64
          provenance: true
          sbom: true

      - name: Write job summary
        shell: bash
        run: |
          {
            echo "## compile-lab (amd64) Published"
            echo ""
            echo "Built natively on x86_64 runner"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| **Image** | \`ghcr.io/${{ github.repository_owner }}/compile-lab\` |"
            echo "| **Digest** | \`${{ steps.build-push.outputs.digest }}\` |"
            echo "| **Tags** | \`${{ steps.meta.outputs.tags }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── ARM64 ──────────────────────────────────────────────────────────────────
  build-arm64:
    name: Build and push (arm64) → compile-lab-arm
    runs-on: ubuntu-24.04-arm

    outputs:
      image-digest: ${{ steps.build-push.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/compile-lab-arm
          tags: |
            type=raw,value=latest
            type=semver,pattern=v{{version}}
            type=sha,format=short
          labels: |
            org.opencontainers.image.title=Multi-Language Online Compiler (arm64)
            org.opencontainers.image.description=Supports Java 17, Python 3, C, C++, JavaScript, and TypeScript
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push (arm64)
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: ${{ github.event_name != 'workflow_dispatch' || inputs.push_image == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,mode=max,scope=arm64
          provenance: true
          sbom: true

      - name: Write job summary
        shell: bash
        run: |
          {
            echo "## compile-lab-arm (arm64) Published"
            echo ""
            echo "Built natively on ARM64 runner (no QEMU emulation)"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| **Image** | \`ghcr.io/${{ github.repository_owner }}/compile-lab-arm\` |"
            echo "| **Digest** | \`${{ steps.build-push.outputs.digest }}\` |"
            echo "| **Tags** | \`${{ steps.meta.outputs.tags }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
