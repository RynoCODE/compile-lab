version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Multi-language Online Compiler — Docker Compose
#
# Supported languages: Java 17 · Python 3 · C (gcc) · C++ (g++) · JavaScript · TypeScript (tsc)
#
# Security posture:
#   • Non-root user (appuser:1001) enforced in the Dockerfile
#   • no-new-privileges: prevents sudo / setuid escalation
#   • Capability drop: removes all Linux capabilities
#   • tmpfs for /tmp: all temp source/binary files live in RAM only
#   • Read-only root filesystem (app writes only to /tmp via tmpfs)
#   • Isolated network: only port 3000 exposed to the host
#   • Resource limits (CPU + RAM) prevent runaway user processes
#
# NOTE on noexec:
#   The tmpfs intentionally does NOT use the noexec flag.
#   C and C++ compilation produces native binaries that must be executed
#   from /tmp.  The container is already isolated via cap_drop ALL,
#   no-new-privileges, and the 5-second execution timeout, providing
#   sufficient defence-in-depth without needing noexec.
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ─────────────────────────────────────────────────────────────────────────────
  # Buildx service for creating multi-platform images
  #
  # This service uses Docker Buildx to build the application image for both
  # amd64 and arm64 architectures and push it to a container registry.
  #
  # Usage:
  #   1. Replace "YOUR_DOCKER_REGISTRY/java-compiler" with your actual
  #      image name in a registry you have push access to.
  #   2. Run: docker-compose run --rm buildx
  #
  # After building, the `code-compiler` service will pull the appropriate
  # architecture-specific image from the registry.
  # ─────────────────────────────────────────────────────────────────────────────
  buildx:
    image: docker/buildx-bin:latest
    container_name: buildx
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/workdir
    command: >
      build
      --platform linux/amd64,linux/arm64
      --tag compile-lab:latest
      --file /workdir/Dockerfile
      --output=type=image,push=true
      /workdir

  code-compiler:
    build:
      context: .
      dockerfile: Dockerfile
    image: compile-lab:latest
    container_name: code-compiler

    # ── Ports ──────────────────────────────────────────────────────────────
    ports:
      - "3000:3000"

    # ── Environment ────────────────────────────────────────────────────────
    environment:
      NODE_ENV   : production
      PORT       : "3000"
      CORS_ORIGIN: "*"

    # ── Resource limits ────────────────────────────────────────────────────
    deploy:
      resources:
        limits:
          cpus  : "2.0"    # Max 2 CPU cores
          memory: "512M"   # Max 512 MB RAM
        reservations:
          cpus  : "0.25"
          memory: "128M"

    # ── Security hardening ─────────────────────────────────────────────────
    security_opt:
      - no-new-privileges:true

    cap_drop:
      - ALL

    # ── Read-only root fs + writable /tmp via RAM-only tmpfs ───────────────
    # exec is explicitly required — Docker adds noexec to tmpfs by default,
    # so we must override it. C/C++ binaries compiled into /tmp must be
    # executable. Defence-in-depth is provided by cap_drop ALL,
    # no-new-privileges, and the 5-second execution timeout.
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=256m,exec

    # ── Healthcheck ────────────────────────────────────────────────────────
    healthcheck:
      test    : ["CMD", "node", "-e",
                 "require('http').get('http://localhost:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout : 10s
      retries : 3
