<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Online multi-language compiler — write, compile, and run Java, Python, C, C++, JavaScript, and TypeScript code in your browser." />
  <title>Online Code Compiler — Java, Python, C, C++, JavaScript, TypeScript</title>

  <!-- Preconnect to CDN for faster Monaco load -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />

  <!-- App stylesheet -->
  <link rel="stylesheet" href="/css/style.css" />

  <!-- Monaco Editor AMD loader (loaded synchronously so the editor
       is ready before the DOMContentLoaded fires in app.js) -->
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.47.0/min/vs/loader.js"></script>
</head>

<body>

  <!-- ═══════════════════════════════════════════════════════════════
       HEADER
  ═══════════════════════════════════════════════════════════════════ -->
  <header class="header">

    <!-- Brand -->
    <a class="header__brand" href="/" title="Online Code Compiler">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none"
           xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect width="28" height="28" rx="6" fill="#4caf50"/>
        <text x="14" y="20" font-family="monospace" font-weight="700"
              font-size="13" fill="white" text-anchor="middle">&lt;/&gt;</text>
      </svg>
      <span>CodeRun</span>
    </a>

    <!-- Actions -->
    <div class="header__actions">

      <!-- ── Language selector (primary control) ─────────────────── -->
      <select id="lang-select" class="lang-select"
              title="Select programming language"
              aria-label="Select programming language">
        <option value="java">Java</option>
        <option value="python">Python 3</option>
        <option value="c">C (gcc)</option>
        <option value="cpp">C++ (g++)</option>
        <option value="javascript">JavaScript</option>
        <option value="typescript">TypeScript</option>
      </select>

      <!-- ── Example snippets (language-aware) ───────────────────── -->
      <select id="example-select" class="example-select"
              title="Load a code example" aria-label="Load code example">
        <option value="">Load Example…</option>
        <!-- Java examples -->
        <option value="java_hello"       data-lang="java">Hello World</option>
        <option value="java_fibonacci"   data-lang="java">Fibonacci Series</option>
        <option value="java_scanner"     data-lang="java">Read User Input</option>
        <option value="java_bubbleSort"  data-lang="java">Bubble Sort</option>
        <option value="java_factorial"   data-lang="java">Factorial (Recursion)</option>
        <option value="java_infinite"    data-lang="java">Infinite Loop (demo)</option>
        <!-- Python examples -->
        <option value="py_hello"         data-lang="python">Hello World</option>
        <option value="py_fibonacci"     data-lang="python">Fibonacci Series</option>
        <option value="py_input"         data-lang="python">Read User Input</option>
        <option value="py_infinite"      data-lang="python">Infinite Loop (demo)</option>
        <!-- C examples -->
        <option value="c_hello"          data-lang="c">Hello World</option>
        <option value="c_scanf"          data-lang="c">Read User Input</option>
        <option value="c_infinite"       data-lang="c">Infinite Loop (demo)</option>
        <!-- C++ examples -->
        <option value="cpp_hello"        data-lang="cpp">Hello World</option>
        <option value="cpp_cin"          data-lang="cpp">Read User Input</option>
        <option value="cpp_infinite"     data-lang="cpp">Infinite Loop (demo)</option>
        <!-- JavaScript examples -->
        <option value="js_hello"         data-lang="javascript">Hello World</option>
        <option value="js_arrow"         data-lang="javascript">Arrow Functions</option>
        <option value="js_infinite"      data-lang="javascript">Infinite Loop (demo)</option>
        <!-- TypeScript examples -->
        <option value="ts_hello"         data-lang="typescript">Hello World</option>
        <option value="ts_interface"     data-lang="typescript">Interface & Types</option>
        <option value="ts_infinite"      data-lang="typescript">Infinite Loop (demo)</option>
      </select>

      <!-- ── Show Warnings toggle (C / C++ only) ──────────────────── -->
      <!-- Visibility is controlled by JS: shown only for C and C++ -->
      <label id="strict-warnings-label" class="strict-warnings"
             title="Enables -Wall: shows compiler warnings without treating them as errors. Your program will still compile and run."
             aria-label="Show compiler warnings (-Wall) for C/C++">
        <input type="checkbox" id="strict-warnings-toggle"
               aria-checked="false" />
        <span class="strict-warnings__pill" aria-hidden="true"></span>
        <span class="strict-warnings__text">Show Warnings</span>
      </label>

      <!-- ── Theme toggle ─────────────────────────────────────────── -->
      <button id="btn-theme" class="btn-icon" title="Switch to Light Theme"
              aria-label="Toggle colour theme">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
        </svg>
      </button>

      <!-- ── Run button ────────────────────────────────────────────── -->
      <button id="btn-run" class="btn-run" title="Run (Ctrl+Enter)"
              aria-label="Compile and run code">
        <svg class="btn-run__icon" width="14" height="14" viewBox="0 0 24 24"
             fill="currentColor" aria-hidden="true">
          <polygon points="5,3 19,12 5,21"/>
        </svg>
        <div class="btn-run__spinner" aria-hidden="true"></div>
        <span>Run</span>
      </button>

    </div>
  </header>

  <!-- ═══════════════════════════════════════════════════════════════
       MAIN WORKSPACE  (editor | resizer | output)
  ═══════════════════════════════════════════════════════════════════ -->
  <main class="workspace" role="main">

    <!-- ── Editor panel ─────────────────────────────────────────── -->
    <section class="panel panel--editor" id="editor-panel"
             aria-label="Code editor">

      <div class="panel__header">
        <!-- Filename updates dynamically via JS when language changes -->
        <span id="editor-filename">HelloWorld.java</span>
        <div class="panel__header-actions">
          <button id="btn-copy-code" class="panel__header-btn"
                  title="Copy source code" aria-label="Copy code">
            Copy
          </button>
        </div>
      </div>

      <!-- Monaco Editor mounts here -->
      <div id="monaco-editor" role="textbox"
           aria-label="Source code editor"
           aria-multiline="true"></div>

    </section>

    <!-- ── Drag-to-resize splitter ──────────────────────────────── -->
    <div class="resizer" id="resizer"
         role="separator" aria-orientation="vertical"
         aria-label="Resize panels" tabindex="0"></div>

    <!-- ── Output panel ─────────────────────────────────────────── -->
    <section class="panel panel--output" id="output-panel"
             aria-label="Output terminal">

      <div class="panel__header">
        <span>Output</span>
        <div class="panel__header-actions">
          <button id="btn-toggle-stdin" class="panel__header-btn"
                  title="Toggle stdin input" aria-expanded="false"
                  aria-controls="stdin-section">
            Input (stdin)
          </button>
          <button id="btn-clear-output" class="panel__header-btn"
                  title="Clear output (Ctrl+L)" aria-label="Clear output">
            Clear
          </button>
        </div>
      </div>

      <!-- Stdout / Stderr display -->
      <div id="output-terminal" class="output-terminal"
           role="log" aria-live="polite" aria-atomic="true">
        <span class="out-placeholder">
          Click <strong>Run</strong> or press <kbd>Ctrl+Enter</kbd> to compile and execute your code.
        </span>
      </div>

      <!-- Stdin input (hidden by default) -->
      <div id="stdin-section" class="stdin-section" aria-hidden="true">
        <div class="stdin-section__header">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5" aria-hidden="true">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
          Standard Input (stdin)
        </div>
        <textarea id="stdin-textarea"
                  placeholder="Enter program input here (one value per line)…"
                  spellcheck="false"
                  aria-label="Standard input for the program"></textarea>
      </div>

    </section>
  </main>

  <!-- ═══════════════════════════════════════════════════════════════
       STATUS BAR (footer)
  ═══════════════════════════════════════════════════════════════════ -->
  <footer class="footer" role="contentinfo">
    <!-- Language indicator — text updated by JS -->
    <span class="footer__item" id="footer-lang">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="#4caf50"
           aria-hidden="true"><circle cx="12" cy="12" r="10"/></svg>
      &nbsp;<span id="footer-lang-text">Java 17</span>
    </span>
    <span class="footer__item" id="footer-pos" aria-live="polite">Ln 1, Col 1</span>
    <span class="footer__item" id="footer-status" aria-live="polite">
      <span class="footer__dot"></span>
      &nbsp;Ready
    </span>
    <span class="footer__item" style="margin-left:auto">
      Ctrl+Enter to Run &nbsp;·&nbsp; Ctrl+L to Clear
    </span>
  </footer>

  <!-- App logic -->
  <script src="/js/app.js" defer></script>

</body>
</html>
