# ─────────────────────────────────────────────────────────────────────────────
# Workflow 3 — Build & Push Docker Image to GHCR
#
# Triggers on every semver release tag  (e.g. v1.2.3  →  refs/tags/v1.2.3)
# and on workflow_dispatch for manual on-demand publishes.
#
# Published tags:
#   ghcr.io/<owner>/<repo>:v1.2.3   ← exact version from Git tag
#   ghcr.io/<owner>/<repo>:latest   ← updated on every release publish
#   ghcr.io/<owner>/<repo>:sha-<7>  ← short SHA (manual dispatch fallback)
#
# Layer caching: type=gha is used for both cache-from and cache-to.
# This caches each Docker build layer in the Actions cache, so the heavy
# multi-runtime image (JDK 17 + Node 20 + Python + gcc + g++) builds fast
# after the first successful run.
# ─────────────────────────────────────────────────────────────────────────────

name: Build & Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'   # strict semver: v1.2.3, v10.0.1, etc.
  workflow_dispatch:
    inputs:
      push_image:
        description: 'Push image to GHCR (set false to dry-run build only)'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

# Required to push packages to ghcr.io via GITHUB_TOKEN
permissions:
  packages: write
  contents: read

jobs:
  build-and-push:
    name: Build and push to GHCR
    runs-on: ubuntu-latest

    outputs:
      image-digest: ${{ steps.build-push.outputs.digest }}
      image-metadata: ${{ steps.meta.outputs.json }}

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Docker Buildx (required for cache export/import) ─────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 3. Authenticate to GitHub Container Registry ──────────────────────
      # GITHUB_TOKEN is automatically provisioned by Actions — no manual secret
      # is needed.  The account must have "Write" access to the package.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 4. Derive image tags and labels from Git metadata ─────────────────
      # type=semver,pattern=v{{version}}  → v1.2.3  (preserves the "v" prefix)
      # type=raw,value=latest             → always tag as latest
      # type=sha                          → short-SHA tag (useful for manual runs)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern=v{{version}}
            type=raw,value=latest
            type=sha,format=short
          labels: |
            org.opencontainers.image.title=Multi-Language Online Compiler
            org.opencontainers.image.description=Supports Java 17, Python 3, C, C++, JavaScript, and TypeScript
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      # ── 5. Build and push with GHA layer cache ────────────────────────────
      # cache-from: pulls previously cached layers from the Actions cache.
      # cache-to:   saves new/updated layers back to the Actions cache.
      # mode=max   caches ALL layers including intermediate build stages,
      # which is important for this multi-stage Dockerfile (deps + runtime).
      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'workflow_dispatch' || inputs.push_image == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Provenance and SBOM attestations (free in GHCR)
          provenance: true
          sbom: true

      # ── 6. Write job summary with full image URL and digest ───────────────
      - name: Write job summary
        shell: bash
        run: |
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          DIGEST="${{ steps.build-push.outputs.digest }}"

          {
            echo "## Docker Image Published"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| **Registry** | \`ghcr.io\` |"
            echo "| **Image** | \`ghcr.io/${REPO_LC}\` |"
            echo "| **Digest** | \`${DIGEST}\` |"
            echo "| **Triggered by** | \`${{ github.event_name }}\` |"
            echo "| **Ref** | \`${{ github.ref }}\` |"
            echo "| **Commit** | \`${{ github.sha }}\` |"
            echo ""
            echo "### Tags published"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
            echo ""
            echo "### Pull command"
            echo '```bash'
            echo "docker pull ghcr.io/${REPO_LC}@${DIGEST}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
